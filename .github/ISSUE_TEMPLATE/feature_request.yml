name: Feature request
description: Suggest an improvement for Comet Studio.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user need should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any extra context, screenshots, or alternatives.

