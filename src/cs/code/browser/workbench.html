<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" href="data:," />
		<title>Comet Studio</title>
		<style>
			html,
			body {
				margin: 0;
				min-height: 100%;
				background: #f6f8fb;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", sans-serif;
			}

			#root {
				min-height: 100vh;
				min-height: 100dvh;
			}

			.bootstrap-status {
				min-height: 100vh;
				min-height: 100dvh;
				box-sizing: border-box;
				display: grid;
				align-content: start;
				gap: 12px;
				padding: 24px;
				color: #1c2733;
			}

			.bootstrap-status h1 {
				margin: 0;
				font-size: 18px;
				line-height: 1.3;
			}

			.bootstrap-status p {
				margin: 0;
				color: #506070;
				font-size: 13px;
				line-height: 1.5;
			}

			.bootstrap-status pre {
				margin: 0;
				padding: 16px;
				overflow: auto;
				white-space: pre-wrap;
				word-break: break-word;
				border: 1px solid #d7e0ea;
				border-radius: 10px;
				background: #ffffff;
				color: #1c2733;
				font: 12px/1.5 Menlo, Monaco, Consolas, monospace;
			}
		</style>
	</head>
	<body>
		<div id="root">
			<main class="bootstrap-status">
				<h1>Comet Studio</h1>
				<p id="bootstrap-status-text">Bootstrapping web renderer...</p>
				<pre id="bootstrap-status-detail" hidden></pre>
			</main>
		</div>
		<script>
			(() => {
				const text = document.getElementById('bootstrap-status-text');
				const detail = document.getElementById('bootstrap-status-detail');

				window.__csSetBootstrapStatus = (message, error) => {
					if (text) {
						text.textContent = message;
					}

					if (!detail) {
						return;
					}

					if (error === undefined || error === null || error === '') {
						detail.hidden = true;
						detail.textContent = '';
						return;
					}

					const normalized =
						error instanceof Error
							? error.stack || error.message
							: typeof error === 'string'
								? error
								: JSON.stringify(error, null, 2);
					detail.hidden = false;
					detail.textContent = normalized;
				};

				window.__csSetBootstrapStatus('Loading /src/cs/code/browser/workbench.ts ...');
				window.addEventListener('error', (event) => {
					window.__csSetBootstrapStatus(
						'Web renderer failed before workbench mount.',
						event.error,
					);
				});
				window.addEventListener('unhandledrejection', (event) => {
					window.__csSetBootstrapStatus(
						'Web renderer rejected during startup.',
						event.reason,
					);
				});
			})();
		</script>
		<script
			type="module"
			src="/src/cs/code/browser/workbench.ts"
			onerror="window.__csSetBootstrapStatus && window.__csSetBootstrapStatus('Failed to load /src/cs/code/browser/workbench.ts', 'Module script load error.')"
		></script>
	</body>
</html>
